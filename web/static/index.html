    <script>
      // Prevent flash of wrong theme
      (function () {
        var t = localStorage.getItem("minicloud-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme:dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
